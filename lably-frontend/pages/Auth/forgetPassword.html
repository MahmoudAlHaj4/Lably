<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lably — Forgot Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Floating animation for background circles */
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        .animate-float {
            animation: float 8s ease-in-out infinite;
        }
        .animate-float-slow {
            animation: float 12s ease-in-out infinite;
        }
        .animate-float-delay {
            animation: float 10s ease-in-out infinite;
            animation-delay: -3s;
        }
        /* Soft card – clean, no heavy shadows */
        .soft-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(228, 229, 232, 0.3);
            border-radius: 28px;
        }
    </style>
</head>
<body class="font-['DM_Sans'] bg-[#F5F6F8] text-[#0D1B2A] min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Background circles (same as index) -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-[600px] h-[600px] bg-green-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] bg-teal-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float-slow"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-emerald-50 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-float-delay"></div>
        <div class="absolute bottom-20 right-20 w-72 h-72 bg-green-100 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-float" style="animation-delay: -2s;"></div>
        <div class="absolute top-20 left-20 w-80 h-80 bg-green-50 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float-slow" style="animation-delay: -5s;"></div>
    </div>

    <!-- Centered card (comfortable width) -->
    <div class="relative z-10 w-full max-w-lg">
        <div class="soft-card p-8 md:p-10">

            <!-- Logo (your brand) -->
            <div class="flex items-center justify-center gap-2 mb-8">
                <i class="fa-solid fa-tooth text-[#16a34a] text-3xl"></i>
                <span class="font-['DM_Serif_Display'] text-3xl text-[#0D1B2A] tracking-tight">Lably</span>
            </div>

            <!-- Heading -->
            <h1 class="text-2xl md:text-3xl font-semibold text-[#0D1B2A] mb-2 text-center">Forgot password?</h1>
            <p class="text-sm text-[#767F8C] mb-8 text-center">Enter your email and we'll send you a reset link.</p>

            <!-- Forgot password form (IDs can be added as needed) -->
            <form id="forgot-form">
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-[#0D1B2A] mb-1.5">Email address</label>
                    <input type="email" id="email" name="email" placeholder="anna@example.com" required
                           class="w-full px-4 py-3 border border-[#E4E5E8] rounded-xl text-sm text-[#0D1B2A] placeholder-[#b0b7c3] focus:outline-none focus:border-[#16a34a] focus:ring-2 focus:ring-[#16a34a]/10 transition bg-white/60 backdrop-blur-sm">
                </div>

                <button type="submit" class="w-full bg-[#16a34a] hover:bg-[#15803d] text-white font-semibold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                    Send reset link <i class="fa-solid fa-arrow-right"></i>
                </button>

                <!-- Optional error/success message placeholder -->
                <p class="text-xs text-center mt-3 min-h-[1rem]" id="forgot-message"></p>
            </form>

            <!-- Back to sign in link -->
            <div class="text-center mt-6">
                <a href="./login.html" class="text-sm text-[#16a34a] font-medium hover:underline inline-flex items-center gap-1">
                    <i class="fa-solid fa-arrow-left"></i> Back to sign in
                </a>
            </div>

            <!-- Simple divider (optional, keeps design clean) -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-[#E4E5E8]"></div>
                <span class="text-xs text-[#767F8C]">or</span>
                <div class="flex-1 h-px bg-[#E4E5E8]"></div>
            </div>

            <!-- Create account link (optional, but helpful) -->
            <p class="text-xs text-[#767F8C] text-center">
                Don't have an account? <a href="./register.html" class="text-[#16a34a] font-medium hover:underline">Create one</a>
            </p>
        </div>
    </div>

    <script>
        // Simple form handler (replace with your actual logic)
        document.getElementById('forgot-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('forgot-message');
            if (email) {
                msg.innerText = '✅ Reset link sent! (demo)';
                msg.style.color = '#16a34a';
            } else {
                msg.innerText = 'Please enter your email.';
                msg.style.color = '#dc2626';
            }
        });
    </script>

    <!-- Your external scripts (preserved) -->
    <!-- <script src="../config.js"></script>
    <script src="../scripts/auth.js"></script> -->
</body>
</html>
