<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lably — Find Jobs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Urbanist', sans-serif; }
        body { background-color: #f7fafe; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        @keyframes shimmer {
            0% { background-position: -700px 0; }
            100% { background-position: 700px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e8eef4 25%, #f0f5fa 50%, #e8eef4 75%);
            background-size: 700px 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-[#0D1B2A]">

    <!-- NAV -->
    <nav class="relative sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-[7%] h-[70px] flex items-center justify-between">
        <a href="../../index.html" class="flex items-center gap-2 no-underline">
            <i class="fa-solid fa-tooth text-[#16a34a] text-2xl"></i>
            <span class="font-['DM_Serif_Display'] text-2xl text-[#0D1B2A] tracking-tight">Lably</span>
        </a>

        <div class="flex items-center gap-4">
            <div class="relative">
                <button id="avatarBtn"
                        class="flex items-center gap-2.5 pl-1 pr-3 py-1 rounded-xl hover:bg-gray-50 border-2 border-transparent hover:border-gray-100 transition-all duration-200">
                    <div class="relative w-9 h-9 shrink-0">
                        <div class="w-9 h-9 rounded-xl bg-green-100 flex items-center justify-center overflow-hidden">
                            <span class="text-sm font-extrabold text-[#16a34a]" id="navInitials"></span>
                            <img id="navAvatar" src="" class="hidden w-full h-full object-cover rounded-xl"/>
                        </div>
                        <div id="navBtnSkeleton" class="skeleton absolute inset-0 rounded-xl"></div>
                    </div>
                    <div class="text-left hidden sm:block">
                        <div id="navNameSkeleton" class="skeleton h-3.5 w-20 rounded mb-1"></div>
                        <p class="text-sm font-extrabold text-[#0D1B2A] leading-none hidden" id="navName"></p>
                        <p class="text-xs text-gray-400 font-medium mt-0.5">Job Seeker</p>
                    </div>
                    <i class="fa-solid fa-chevron-down text-gray-400 text-xs ml-1" id="chevron"></i>
                </button>

                <div id="dropdown"
                     class="hidden absolute right-0 top-[calc(100%+8px)] w-52 bg-white border border-gray-100 rounded-2xl shadow-lg shadow-gray-100 overflow-hidden z-50">
                    <div class="px-4 py-3 border-b border-gray-50">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="relative w-9 h-9 shrink-0">
                                <div class="w-9 h-9 rounded-xl bg-green-100 flex items-center justify-center overflow-hidden">
                                    <span class="text-sm font-extrabold text-[#16a34a]" id="dropdownInitials"></span>
                                    <img id="dropdownAvatar" src="" class="hidden w-full h-full object-cover rounded-xl"/>
                                </div>
                                <div id="navAvatarSkeleton" class="skeleton absolute inset-0 rounded-xl"></div>
                            </div>
                            <div>
                                <div id="dropdownNameSkeleton" class="skeleton h-3.5 w-24 rounded mb-1.5"></div>
                                <p class="text-sm font-extrabold text-[#0D1B2A] hidden" id="dropdownName"></p>
                            </div>
                        </div>
                        <span class="inline-flex items-center gap-1 mt-1 px-2 py-0.5 bg-green-50 border border-green-100 text-[#16a34a] text-xs font-bold rounded-lg">
                            <i class="fa-solid fa-circle-check text-[10px]"></i> Verified
                        </span>
                    </div>
                    <div class="py-2">
                        <a href="./profile.html" class="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-[#0D1B2A] hover:bg-gray-50 transition no-underline">
                            <i class="fa-solid fa-user text-gray-300 w-4 text-center"></i> My Profile
                        </a>
                        <a href="./jobs.html" class="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-[#16a34a] bg-green-50 transition no-underline">
                            <i class="fa-solid fa-briefcase text-[#16a34a] w-4 text-center"></i> Browse Jobs
                        </a>
                    </div>
                    <div class="border-t border-gray-50 py-2">
                        <button id="signOutBtn" class="flex items-center gap-3 w-full px-4 py-2.5 text-sm font-semibold text-red-400 hover:bg-red-50 transition">
                            <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- SEARCH BAR -->
    <div class="px-[7%] pt-10 pb-6">
        <div class="bg-white rounded-2xl border border-gray-100 p-7">
            <h1 class="text-2xl font-extrabold text-[#0D1B2A] mb-1">Find Your Next Role</h1>
            <p class="text-gray-400 text-sm font-medium mb-6">Discover dental tech opportunities that match your expertise</p>
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex items-center gap-3 flex-1 bg-[#f7fafe] border border-gray-200 rounded-xl px-4 py-3">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm shrink-0"></i>
                    <input id="searchInput" type="text" placeholder="Job title or keywords"
                           class="bg-transparent w-full text-sm font-medium text-[#0D1B2A] placeholder-gray-400 outline-none">
                </div>
                <div class="flex items-center gap-3 w-full sm:w-64 bg-[#f7fafe] border border-gray-200 rounded-xl px-4 py-3">
                    <i class="fa-solid fa-location-dot text-gray-400 text-sm shrink-0"></i>
                    <input id="locationInput" type="text" placeholder="Location"
                           class="bg-transparent w-full text-sm font-medium text-[#0D1B2A] placeholder-gray-400 outline-none">
                </div>
                <button id="searchBtn" class="px-7 py-3 bg-[#16a34a] text-white text-sm font-bold rounded-xl hover:bg-[#15803d] transition shrink-0">
                    Search Jobs
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="px-[7%] pb-20 flex flex-col lg:flex-row gap-8">

        <!-- Sidebar -->
        <aside class="w-full lg:w-72 shrink-0">
            <div class="bg-white rounded-2xl border border-gray-100 p-8 lg:sticky lg:top-24">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xl font-extrabold text-[#0D1B2A]">Filter Jobs</h2>
                    <button id="clearFilters" class="text-sm font-bold text-[#16a34a] hover:underline">Clear All</button>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-5 cursor-pointer">
                        <h3 class="text-base font-bold text-[#0D1B2A]">Job Type</h3>
                    </div>
                    <div class="flex flex-wrap lg:flex-col gap-4">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" value="remote" class="job-type-filter w-4 h-4 accent-[#16a34a] rounded">
                            <span class="text-sm font-semibold text-gray-500 group-hover:text-[#0D1B2A] transition">Remote</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" value="on_site" class="job-type-filter w-4 h-4 accent-[#16a34a] rounded">
                            <span class="text-sm font-semibold text-gray-500 group-hover:text-[#0D1B2A] transition">On-Site</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" value="hybrid" class="job-type-filter w-4 h-4 accent-[#16a34a] rounded">
                            <span class="text-sm font-semibold text-gray-500 group-hover:text-[#0D1B2A] transition">Hybrid</span>
                        </label>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Jobs list -->
        <div class="flex-1 min-w-0">

            <div class="flex items-center justify-between mb-6">
                <p class="text-base font-semibold text-gray-500">
                    Showing <span id="jobCount" class="font-extrabold text-[#0D1B2A]">0</span> jobs
                </p>
                <!-- Hidden on mobile -->
                <div class="hidden sm:flex items-center gap-2">
                    <button id="gridViewBtn" class="w-10 h-10 rounded-xl bg-[#16a34a] text-white flex items-center justify-center">
                        <i class="fa-solid fa-grip text-sm"></i>
                    </button>
                    <button id="listViewBtn" class="w-10 h-10 rounded-xl border-2 border-gray-200 bg-white text-gray-400 flex items-center justify-center hover:border-[#16a34a] hover:text-[#16a34a] transition">
                        <i class="fa-solid fa-list text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Skeleton -->
            <div id="skeletonGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-5">
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 p-7">
                    <div class="flex items-center gap-4 mb-5"><div class="skeleton w-14 h-14 rounded-2xl shrink-0"></div><div class="flex-1"><div class="skeleton h-5 w-3/4 mb-2"></div><div class="skeleton h-4 w-1/2"></div></div></div>
                    <div class="flex gap-2 mb-4"><div class="skeleton h-6 w-24"></div><div class="skeleton h-6 w-16"></div></div>
                    <div class="skeleton h-4 w-32 mb-6"></div>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50"><div class="skeleton h-9 w-24 rounded-xl ml-auto"></div></div>
                </div>
            </div>

            <!-- Jobs Grid -->
            <div id="jobsGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-5 hidden"></div>

            <!-- Empty state -->
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mb-4">
                    <i class="fa-solid fa-magnifying-glass text-gray-300 text-2xl"></i>
                </div>
                <p class="text-lg font-extrabold text-[#0D1B2A] mb-1">No jobs found</p>
                <p class="text-sm text-gray-400 font-medium">Try adjusting your filters or search terms</p>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="hidden flex items-center justify-between mt-10 pt-6 border-t border-gray-100">
                <button id="prevBtn"
                    class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-sm font-bold text-[#0D1B2A] hover:border-[#16a34a] hover:text-[#16a34a] transition disabled:opacity-40 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Previous
                </button>
                <span id="pageInfo" class="text-sm font-semibold text-gray-400"></span>
                <button id="nextBtn"
                    class="flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-sm font-bold text-[#0D1B2A] hover:border-[#16a34a] hover:text-[#16a34a] transition disabled:opacity-40 disabled:cursor-not-allowed">
                    Next <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>

        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="../../scripts/utils/toast.js"></script>
    <script src="../../scripts/utils/authGuard.js"></script>
    <script src="../../scripts/utils/helpers.js"></script>
    <script src="../../scripts/Job Seeker/Jobs/seekerUI.js"></script>
    <script src="../../scripts/Job Seeker/Jobs/seekerData.js"></script>
    <script src="../../scripts/Job Seeker/Jobs/renderSeekerJobs.js"></script>
    <script src="../../scripts/Job Seeker/Jobs/seeker.js"></script>
</body>
</html>
